<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DrakeOS</title>

    <style>
        :root {
            --bg: #050505;
            --green: #00ff88;
            --soft: #00cc66;
            --text: #baffd6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Courier New", monospace;
        }

        body {
            background: var(--bg);
            color: var(--green);
            overflow: hidden;
        }

        /* Particles canvas */
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .hero {
            text-align: center;
            padding: 100px 20px 40px;
        }

        .hero h1 {
            font-size: 48px;
        }

        .section {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .terminal {
            background: black;
            border: 1px solid var(--green);
            padding: 20px;
            border-radius: 10px;
            height: 350px;
            overflow-y: auto;
        }

        .line {
            margin-bottom: 5px;
        }

        .input-line {
            display: flex;
        }

        .prompt {
            margin-right: 5px;
        }

        input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--green);
            width: 100%;
            font-family: inherit;
        }
    </style>
</head>

<body>

    <canvas id="particles"></canvas>

    <div class="hero">
        <h1>DrakeOS</h1>
        <p>Type <b>help</b> to navigate</p>
    </div>

    <div class="section">
        <div class="terminal" id="terminal">
            <div class="line">Booting DrakeOS v2.0...</div>
            <div class="line">System Ready.</div>

            <div class="input-line">
                <span class="prompt">$</span>
                <input type="text" id="terminalInput" autofocus>
            </div>
        </div>
    </div>

    <script>
        /* PARTICLES */
        const canvas = document.getElementById("particles");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        for (let i = 0; i < 80; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 2,
                d: Math.random() * 1
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ff88";
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fill();
                p.y += p.d;
                if (p.y > canvas.height) p.y = 0;
            });
            requestAnimationFrame(animate);
        }
        animate();

        /* TERMINAL ROUTING */
        const input = document.getElementById("terminalInput");
        const terminal = document.getElementById("terminal");

        const routes = {
            help: "Commands: about, resume, games, irl, clear",
            about: "about.html",
            resume: "resume.html",
            games: "games.html",
            irl: "irl.html"
        };

        input.addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                const value = input.value.trim().toLowerCase();

                const line = document.createElement("div");
                line.className = "line";
                line.textContent = "$ " + value;
                terminal.insertBefore(line, input.parentElement);

                if (value === "clear") {
                    location.reload();
                    return;
                }

                if (routes[value] && routes[value].endsWith(".html")) {
                    window.location.href = routes[value];
                    return;
                }

                const response = document.createElement("div");
                response.className = "line";
                response.textContent = routes[value] || "Command not found.";
                terminal.insertBefore(response, input.parentElement);

                input.value = "";
                terminal.scrollTop = terminal.scrollHeight;
            }
        });
    </script>

</body>

</html>
